# -------------------------------------------------------
# App
# -------------------------------------------------------
app.name=Statco HR Portal
app.cors.allowed-origins=http://localhost:3000

# -------------------------------------------------------
# Database - Railway MySQL
# -------------------------------------------------------

spring.datasource.url=jdbc:mysql://zephyr.proxy.rlwy.net:59965/railway?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.username=${MYSQLUSER}

spring.datasource.password=${MYSQLPASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true

# -------------------------------------------------------
# Railway Dynamic Port
# -------------------------------------------------------

server.port=${PORT:8080}

# -------------------------------------------------------
# JWT
# -------------------------------------------------------
app.jwt.secret=statco-hr-portal-super-secret-jwt-signing-key-2024-must-be-256bits
app.jwt.expiration=86400000

# -------------------------------------------------------
# Microsoft 365 SMTP
# Configure with Statco company email credentials
# -------------------------------------------------------
spring.mail.host=smtp.office365.com
spring.mail.port=587
spring.mail.username=hrportal@statco.com
spring.mail.password=your_email_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# -------------------------------------------------------
# File uploads
# -------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# -------------------------------------------------------
# Scheduling (for leave reminders)
# -------------------------------------------------------
spring.task.scheduling.enabled=true
